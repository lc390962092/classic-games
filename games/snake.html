<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        h1 { margin: 10px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .game-container {
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border-radius: 10px;
            overflow: hidden;
        }
        canvas {
            background: #0f0f23;
            display: block;
        }
        .info {
            display: flex;
            gap: 30px;
            margin: 15px 0;
            font-size: 1.2em;
        }
        .info span {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 25px;
        }
        .controls {
            margin-top: 20px;
            text-align: center;
            color: #aaa;
        }
        .controls p { margin: 5px 0; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            margin: 5px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .back { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            display: none;
        }
        .game-over h2 { color: #ff6b6b; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    <div class="info">
        <span>得分: <strong id="score">0</strong></span>
        <span>最高分: <strong id="highScore">0</strong></span>
    </div>
    <div class="game-container">
        <canvas id="game" width="600" height="600"></canvas>
        <div class="game-over" id="gameOver">
            <h2>游戏结束!</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <button class="btn" onclick="startGame()">再来一局</button>
        </div>
    </div>
    <div class="controls">
        <p>🎮 使用方向键或 WASD 控制移动</p>
        <p>⏸️ 按空格键暂停 | 🔄 ESC 返回主页</p>
        <button class="btn" onclick="startGame()">开始游戏</button>
        <button class="btn back" onclick="location.href='../index.html'">返回主页</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 15, y: 15}];
        let food = {x: 20, y: 20};
        let dx = 0, dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameLoop;

        document.getElementById('highScore').textContent = highScore;

        function drawGame() {
            if (gamePaused) return;

            // 移动蛇
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // 撞墙检测
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // 撞自己检测
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // 吃食物检测
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                placeFood();
            } else {
                snake.pop();
            }

            // 清空画布
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格（可选）
            ctx.strokeStyle = '#1a1a3e';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制食物（带发光效果）
            const gradient = ctx.createRadialGradient(
                food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, 0,
                food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize
            );
            gradient.addColorStop(0, '#ff6b6b');
            gradient.addColorStop(1, '#ee5a24');
            ctx.fillStyle = gradient;
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // 绘制蛇
            snake.forEach((segment, index) => {
                const greenValue = Math.floor(200 - (index * 2));
                ctx.fillStyle = index === 0 ? '#00d2d3' : `rgb(0, ${Math.max(greenValue, 100)}, 211)`;
                ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
                
                // 蛇头眼睛
                if (index === 0) {
                    ctx.fillStyle = 'white';
                    ctx.fillRect(segment.x * gridSize + 5, segment.y * gridSize + 5, 4, 4);
                    ctx.fillRect(segment.x * gridSize + 11, segment.y * gridSize + 5, 4, 4);
                    ctx.fillStyle = 'black';
                    ctx.fillRect(segment.x * gridSize + 6, segment.y * gridSize + 6, 2, 2);
                    ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + 6, 2, 2);
                }
            });
        }

        function placeFood() {
            do {
                food.x = Math.floor(Math.random() * tileCount);
                food.y = Math.floor(Math.random() * tileCount);
            } while (snake.some(s => s.x === food.x && s.y === food.y));
        }

        function startGame() {
            snake = [{x: 15, y: 15}];
            dx = 1; dy = 0;
            score = 0;
            document.getElementById('score').textContent = score;
            document.getElementById('gameOver').style.display = 'none';
            gameRunning = true;
            gamePaused = false;
            placeFood();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(drawGame, 100);
        }

        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                location.href = '../index.html';
                return;
            }
            if (!gameRunning) return;
            
            if (e.key === ' ') {
                gamePaused = !gamePaused;
                return;
            }

            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W':
                    if (dy !== 1) { dx = 0; dy = -1; }
                    break;
                case 'ArrowDown': case 's': case 'S':
                    if (dy !== -1) { dx = 0; dy = 1; }
                    break;
                case 'ArrowLeft': case 'a': case 'A':
                    if (dx !== 1) { dx = -1; dy = 0; }
                    break;
                case 'ArrowRight': case 'd': case 'D':
                    if (dx !== -1) { dx = 1; dy = 0; }
                    break;
            }
        });
    </script>
</body>
</html>
