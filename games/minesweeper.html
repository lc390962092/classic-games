<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>扫雷</title>
    * { touch-action: manipulation; }
        <style>
        body { touch-action: manipulation; -webkit-tap-highlight-color: transparent;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #c0c0c0 0%, #a0a0a0 100%);
            font-family: 'Segoe UI', sans-serif;
        }
        h1 {
            margin: 10px 0;
            color: #333;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }
        .game-wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        .game-container {
            background: #c0c0c0;
            padding: 10px;
            border: 3px solid #fff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #c0c0c0;
            border: 2px solid #808080;
            border-right-color: #fff;
            border-bottom-color: #fff;
            margin-bottom: 10px;
        }
        .counter {
            background: #000;
            color: #ff0000;
            padding: 5px 10px;
            font-family: monospace;
            font-size: 1.5em;
            min-width: 60px;
            text-align: center;
        }
        .face-btn {
            width: 40px;
            height: 40px;
            font-size: 1.5em;
            background: #c0c0c0;
            border: 3px solid #fff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            cursor: pointer;
        }
        .face-btn:active {
            border: 3px solid #808080;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
        #board {
            display: grid;
            gap: 1px;
            background: #808080;
            border: 3px solid #808080;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
        .cell {
            width: 30px;
            height: 30px;
            background: #c0c0c0;
            border: 3px solid #fff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            user-select: none;
        }
        .cell:active:not(.revealed):not(.flagged) {
            border: 1px solid #808080;
        }
        .cell.revealed {
            border: 1px solid #b0b0b0;
            background: #c0c0c0;
            cursor: default;
        }
        .cell.flagged {
            background: #c0c0c0;
        }
        .cell.mine {
            background: #ff0000;
        }
        .cell.mine-hit {
            background: #ff0000;
        }
        .cell[data-num="1"] { color: #0000ff; }
        .cell[data-num="2"] { color: #008000; }
        .cell[data-num="3"] { color: #ff0000; }
        .cell[data-num="4"] { color: #000080; }
        .cell[data-num="5"] { color: #800000; }
        .cell[data-num="6"] { color: #008080; }
        .cell[data-num="7"] { color: #000; }
        .cell[data-num="8"] { color: #808080; }
        
        .side-panel {
            background: #c0c0c0;
            padding: 15px;
            border: 3px solid #fff;
            border-right-color: #808080;
            border-bottom-color: #808080;
        }
        .side-panel h3 {
            margin-top: 0;
            color: #333;
        }
        .difficulty {
            margin: 10px 0;
        }
        .difficulty label {
            display: block;
            margin: 5px 0;
            cursor: pointer;
        }
        .btn {
            background: #c0c0c0;
            border: 3px solid #fff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            padding: 8px 20px;
            cursor: pointer;
            margin: 5px 0;
            width: 100%;
        }
        .btn:active {
            border: 3px solid #808080;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
        .instructions {
            margin-top: 15px;
            font-size: 0.9em;
            color: #333;
        }
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #c0c0c0;
            padding: 30px;
            border: 4px solid #fff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            text-align: center;
            display: none;
            z-index: 100;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
        }
        .game-over h2 { margin-top: 0; }
        .win { color: #008000; }
        .lose { color: #ff0000; }
    </style>
</head>
<body>
    <h1>💣 扫雷</h1>
    
    <div class="game-wrapper">
        <div class="game-container">
            <div class="status-bar">
                <div class="counter" id="mineCount">010</div>
                <button class="face-btn" id="faceBtn" onclick="startGame()">🙂</button>
                <div class="counter" id="timer">000</div>
            </div>
            <div id="board"></div>
        </div>
        
        <div class="side-panel">
            <h3>难度选择</h3>
            <div class="difficulty">
                <label><input type="radio" name="diff" value="easy" checked> 初级 (9×9, 10雷)</label>
                <label><input type="radio" name="diff" value="medium"> 中级 (16×16, 40雷)</label>
                <label><input type="radio" name="diff" value="hard"> 高级 (16×30, 99雷)</label>
            </div>
            <button class="btn" onclick="startGame()">新游戏</button>
            <button class="btn" onclick="location.href='../index.html'">返回主页</button>
            
            <div class="instructions">
                <p>🖱️ 左键点击揭开</p>
                <p>🚩 右键点击标记</p>
                <p>💡 数字=周围雷数</p>
                <p>🔄 ESC 返回主页</p>
            </div>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2 id="gameOverText"></h2>
        <button class="btn" onclick="startGame()">再来一局</button>
    </div>

    <script>
        const difficulties = {
            easy: { rows: 9, cols: 9, mines: 10 },
            medium: { rows: 16, cols: 16, mines: 40 },
            hard: { rows: 16, cols: 30, mines: 99 }
        };

        let board = [];
        let revealed = [];
        let flagged = [];
        let gameOver = false;
        let firstClick = true;
        let timer = 0;
        let timerInterval = null;
        let currentDiff = 'easy';

        function initGame() {
            const diff = difficulties[currentDiff];
            board = Array(diff.rows).fill(null).map(() => Array(diff.cols).fill(0));
            revealed = Array(diff.rows).fill(null).map(() => Array(diff.cols).fill(false));
            flagged = Array(diff.rows).fill(null).map(() => Array(diff.cols).fill(false));
            gameOver = false;
            firstClick = true;
            timer = 0;
            clearInterval(timerInterval);
            document.getElementById('timer').textContent = '000';
            document.getElementById('mineCount').textContent = String(diff.mines).padStart(3, '0');
            document.getElementById('faceBtn').textContent = '🙂';
            document.getElementById('gameOver').style.display = 'none';
            renderBoard();
        }

        function placeMines(excludeRow, excludeCol) {
            const diff = difficulties[currentDiff];
            let placed = 0;
            while (placed < diff.mines) {
                const r = Math.floor(Math.random() * diff.rows);
                const c = Math.floor(Math.random() * diff.cols);
                if (board[r][c] !== -1 && !(r === excludeRow && c === excludeCol)) {
                    board[r][c] = -1;
                    placed++;
                }
            }

            // 计算数字
            for (let r = 0; r < diff.rows; r++) {
                for (let c = 0; c < diff.cols; c++) {
                    if (board[r][c] !== -1) {
                        let count = 0;
                        for (let dr = -1; dr <= 1; dr++) {
                            for (let dc = -1; dc <= 1; dc++) {
                                const nr = r + dr, nc = c + dc;
                                if (nr >= 0 && nr < diff.rows && nc >= 0 && nc < diff.cols) {
                                    if (board[nr][nc] === -1) count++;
                                }
                            }
                        }
                        board[r][c] = count;
                    }
                }
            }
        }

        function renderBoard() {
            const diff = difficulties[currentDiff];
            const boardEl = document.getElementById('board');
            boardEl.style.gridTemplateColumns = `repeat(${diff.cols}, 30px)`;
            boardEl.innerHTML = '';

            for (let r = 0; r < diff.rows; r++) {
                for (let c = 0; c < diff.cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;

                    if (revealed[r][c]) {
                        cell.classList.add('revealed');
                        if (board[r][c] === -1) {
                            cell.classList.add('mine');
                            cell.textContent = '💣';
                        } else if (board[r][c] > 0) {
                            cell.textContent = board[r][c];
                            cell.dataset.num = board[r][c];
                        }
                    } else if (flagged[r][c]) {
                        cell.classList.add('flagged');
                        cell.textContent = '🚩';
                    }

                    cell.addEventListener('click', () => handleClick(r, c));
                    cell.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        handleRightClick(r, c);
                    });
                    cell.addEventListener('mousedown', () => {
                        if (!gameOver && !revealed[r][c]) {
                            document.getElementById('faceBtn').textContent = '😮';
                        }
                    });
                    cell.addEventListener('mouseup', () => {
                        if (!gameOver) document.getElementById('faceBtn').textContent = '🙂';
                    });

                    boardEl.appendChild(cell);
                }
            }
        }

        function handleClick(r, c) {
            if (gameOver || flagged[r][c] || revealed[r][c]) return;

            if (firstClick) {
                placeMines(r, c);
                firstClick = false;
                timerInterval = setInterval(() => {
                    timer++;
                    document.getElementById('timer').textContent = String(Math.min(timer, 999)).padStart(3, '0');
                }, 1000);
            }

            reveal(r, c);
            renderBoard();

            if (board[r][c] === -1) {
                endGame(false);
            } else if (checkWin()) {
                endGame(true);
            }
        }

        function reveal(r, c) {
            const diff = difficulties[currentDiff];
            if (r < 0 || r >= diff.rows || c < 0 || c >= diff.cols) return;
            if (revealed[r][c] || flagged[r][c]) return;

            revealed[r][c] = true;

            if (board[r][c] === 0) {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        reveal(r + dr, c + dc);
                    }
                }
            }
        }

        function handleRightClick(r, c) {
            if (gameOver || revealed[r][c]) return;

            flagged[r][c] = !flagged[r][c];
            
            const diff = difficulties[currentDiff];
            const flagCount = flagged.flat().filter(f => f).length;
            document.getElementById('mineCount').textContent = String(Math.max(0, diff.mines - flagCount)).padStart(3, '0');
            
            renderBoard();
        }

        function checkWin() {
            const diff = difficulties[currentDiff];
            for (let r = 0; r < diff.rows; r++) {
                for (let c = 0; c < diff.cols; c++) {
                    if (board[r][c] !== -1 && !revealed[r][c]) return false;
                }
            }
            return true;
        }

        function endGame(win) {
            gameOver = true;
            clearInterval(timerInterval);
            document.getElementById('faceBtn').textContent = win ? '😎' : '😵';
            
            if (!win) {
                // 显示所有雷
                const diff = difficulties[currentDiff];
                for (let r = 0; r < diff.rows; r++) {
                    for (let c = 0; c < diff.cols; c++) {
                        if (board[r][c] === -1) revealed[r][c] = true;
                    }
                }
                renderBoard();
            }

            const overlay = document.getElementById('gameOver');
            const text = document.getElementById('gameOverText');
            text.textContent = win ? '恭喜你赢了! 🎉' : '游戏结束!';
            text.className = win ? 'win' : 'lose';
            overlay.style.display = 'block';
        }

        function startGame() {
            const selected = document.querySelector('input[name="diff"]:checked');
            currentDiff = selected ? selected.value : 'easy';
            initGame();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                location.href = '../index.html';
            }
        });

        initGame();
    </script>
</body>
</html>
