<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记忆翻牌</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        h1 { font-size: 2.5em; margin: 10px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .game-wrapper {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }
        .board-container {
            text-align: center;
        }
        .info {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .info-box {
            background: rgba(255,255,255,0.2);
            padding: 15px 25px;
            border-radius: 25px;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            gap: 15px;
            background: rgba(255,255,255,0.15);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .card {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 2.5em;
            transition: all 0.6s;
            transform-style: preserve-3d;
            position: relative;
        }
        .card:hover:not(.flipped):not(.matched) {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .card.flipped {
            background: white;
            transform: rotateY(180deg);
        }
        .card.matched {
            background: #2ecc71;
            transform: rotateY(180deg);
            animation: matchPulse 0.5s ease;
        }
        @keyframes matchPulse {
            0%, 100% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
        }
        .card .front, .card .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .card .front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-size: 1.5em;
        }
        .card .back {
            background: white;
            transform: rotateY(180deg);
        }
        .side-panel {
            background: rgba(255,255,255,0.15);
            padding: 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            min-width: 200px;
        }
        .side-panel h3 {
            margin-top: 0;
            text-align: center;
        }
        .btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            margin: 5px 0;
            width: 100%;
            transition: all 0.3s;
        }
        .btn:hover {
            background: white;
            color: #667eea;
        }
        .difficulty {
            margin: 15px 0;
        }
        .difficulty label {
            display: block;
            padding: 8px;
            margin: 5px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
        }
        .win-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            display: none;
            border: 3px solid #2ecc71;
            z-index: 100;
        }
        .win-message h2 {
            color: #2ecc71;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>🃏 记忆翻牌</h1>
    
    <div class="game-wrapper">
        <div class="board-container">
            <div class="info">
                <div class="info-box">
                    <span>步数: <strong id="moves">0</strong></span>
                </div>
                <div class="info-box">
                    <span>时间: <strong id="time">00:00</strong></span>
                </div>
            </div>
            <div id="board"></div>
        </div>
        
        <div class="side-panel">
            <h3>游戏设置</h3>
            
            <div class="difficulty">
                <label><input type="radio" name="diff" value="easy" checked> 简单 (4×4)</label>
                <label><input type="radio" name="diff" value="hard"> 困难 (6×6)</label>
            </div>
            
            <button class="btn" onclick="startGame()">新游戏</button>
            <button class="btn" onclick="location.href='../index.html'">返回主页</button>
            
            <div style="margin-top: 20px; font-size: 0.9em; opacity: 0.8;">
                <p>🎯 找出所有配对</p>
                <p>🧠 考验你的记忆力</p>
            </div>
        </div>
    </div>

    <div class="win-message" id="winMessage">
        <h2>🎉 恭喜完成!</h2>
        <p>用时: <span id="finalTime"></span></p>
        <p>步数: <span id="finalMoves"></span></p>
        <button class="btn" onclick="startGame()">再玩一次</button>
    </div>

    <script>
        const emojis = ['🍎', '🍌', '🍇', '🍊', '🍓', '🍑', '🍍', '🥝', '🍒', '🍉', '🥥', '🍋', '🍐', '🍈', '🍏', '🥭', '🫐', '🍅'];
        
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let timer = 0;
        let timerInterval = null;
        let gameActive = false;
        let currentDiff = 'easy';

        function initGame() {
            const board = document.getElementById('board');
            const diff = document.querySelector('input[name="diff"]:checked').value;
            currentDiff = diff;
            
            const cols = diff === 'easy' ? 4 : 6;
            const rows = diff === 'easy' ? 4 : 6;
            const totalCards = cols * rows;
            const pairsNeeded = totalCards / 2;
            
            board.style.gridTemplateColumns = `repeat(${cols}, 100px)`;
            
            // 选择表情并复制成对
            const gameEmojis = emojis.slice(0, pairsNeeded);
            cards = [...gameEmojis, ...gameEmojis];
            
            // 洗牌
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            timer = 0;
            gameActive = true;
            
            clearInterval(timerInterval);
            document.getElementById('moves').textContent = '0';
            document.getElementById('time').textContent = '00:00';
            document.getElementById('winMessage').style.display = 'none';
            
            timerInterval = setInterval(() => {
                timer++;
                const mins = String(Math.floor(timer / 60)).padStart(2, '0');
                const secs = String(timer % 60).padStart(2, '0');
                document.getElementById('time').textContent = `${mins}:${secs}`;
            }, 1000);
            
            renderBoard();
        }

        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            cards.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.innerHTML = `
                    <div class="front">❓</div>
                    <div class="back">${emoji}</div>
                `;
                card.onclick = () => flipCard(index);
                board.appendChild(card);
            });
        }

        function flipCard(index) {
            if (!gameActive) return;
            
            const cardElements = document.querySelectorAll('.card');
            const card = cardElements[index];
            
            // 不能翻已翻开的或已匹配的
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
            
            // 不能翻超过2张
            if (flippedCards.length >= 2) return;
            
            card.classList.add('flipped');
            flippedCards.push({ index, emoji: cards[index] });
            
            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            const [first, second] = flippedCards;
            const cardElements = document.querySelectorAll('.card');
            
            if (first.emoji === second.emoji) {
                // 匹配成功
                setTimeout(() => {
                    cardElements[first.index].classList.add('matched');
                    cardElements[second.index].classList.add('matched');
                    matchedPairs++;
                    flippedCards = [];
                    
                    // 检查胜利
                    if (matchedPairs === cards.length / 2) {
                        gameWin();
                    }
                }, 500);
            } else {
                // 匹配失败
                setTimeout(() => {
                    cardElements[first.index].classList.remove('flipped');
                    cardElements[second.index].classList.remove('flipped');
                    flippedCards = [];
                }, 1000);
            }
        }

        function gameWin() {
            gameActive = false;
            clearInterval(timerInterval);
            
            const mins = String(Math.floor(timer / 60)).padStart(2, '0');
            const secs = String(timer % 60).padStart(2, '0');
            
            document.getElementById('finalTime').textContent = `${mins}:${secs}`;
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('winMessage').style.display = 'block';
        }

        function startGame() {
            initGame();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                location.href = '../index.html';
            }
        });

        // 初始化
        initGame();
    </script>
</body>
</html>
