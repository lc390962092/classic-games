<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>记忆翻牌</title>
    <style>
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            padding: 10px;
            box-sizing: border-box;
        }
        h1 { font-size: 1.8em; margin: 5px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .game-wrapper {
            display: flex;
            gap: 15px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }
        .board-container { text-align: center; }
        .info {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .info-box {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.95em;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            gap: 10px;
            background: rgba(255,255,255,0.15);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .card {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 2em;
            transition: all 0.5s;
            transform-style: preserve-3d;
            position: relative;
            touch-action: manipulation;
        }
        .card:active:not(.flipped):not(.matched) { transform: scale(0.95); }
        .card.flipped { background: white; transform: rotateY(180deg); }
        .card.matched { background: #2ecc71; transform: rotateY(180deg); animation: matchPulse 0.5s ease; }
        @keyframes matchPulse { 0%, 100% { transform: rotateY(180deg) scale(1); } 50% { transform: rotateY(180deg) scale(1.1); } }
        .card .front, .card .back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 10px;
        }
        .card .front { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-size: 1.3em; }
        .card .back { background: white; transform: rotateY(180deg); }
        .side-panel {
            background: rgba(255,255,255,0.15);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            min-width: 180px;
        }
        .side-panel h3 { margin-top: 0; text-align: center; font-size: 1.1em; }
        .btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95em;
            margin: 4px 0;
            width: 100%;
            transition: all 0.3s;
            touch-action: manipulation;
        }
        .btn:active { background: white; color: #667eea; transform: scale(0.98); }
        .difficulty { margin: 12px 0; }
        .difficulty label {
            display: block;
            padding: 8px;
            margin: 4px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .win-message {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            display: none;
            border: 3px solid #2ecc71;
            z-index: 100;
            max-width: 90%;
        }
        .win-message h2 { color: #2ecc71; font-size: 1.8em; margin-bottom: 15px; }
        
        /* 游戏说明 */
        .game-help {
            background: rgba(255,255,255,0.15);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            max-width: 350px;
            text-align: left;
            font-size: 0.9em;
        }
        .game-help h3 { margin: 0 0 10px 0; color: #ffe66d; }
        .game-help ul { margin: 0; padding-left: 20px; }
        .game-help li { margin: 5px 0; }
        
        @media (max-width: 600px) {
            h1 { font-size: 1.5em; }
            #board { grid-template-columns: repeat(4, 70px); gap: 8px; padding: 12px; }
            .card { width: 70px; height: 70px; font-size: 1.6em; }
            .side-panel { min-width: 150px; padding: 15px; }
            .game-wrapper { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <h1>🃏 记忆翻牌</h1>
    
    <div class="game-wrapper">
        <div class="board-container">
            <div class="info">
                <div class="info-box"><span>步数: <strong id="moves">0</strong></span></div>
                <div class="info-box"><span>时间: <strong id="time">00:00</strong></span></div>
            </div>
            <div id="board"></div>
        </div>
        
        <div class="side-panel">
            <h3>游戏设置</h3>
            <div class="difficulty">
                <label><input type="radio" name="diff" value="easy" checked> 简单 (4×4)</label>
                <label><input type="radio" name="diff" value="hard"> 困难 (6×6)</label>
            </div>
            <button class="btn" onclick="startGame()">新游戏</button>
            <button class="btn" onclick="location.href='../index.html'">返回主页</button>
        </div>
    </div>    
    
    <div class="game-help">
        <h3>🎮 游戏说明</h3>
        <ul>
            <li>点击卡片翻转，查看背后的图案</li>
            <li>连续翻开两张相同卡片即可配对</li>
            <li>配对的卡片会保持翻开状态</li>
            <li>找出所有配对即可完成游戏</li>
            <li>挑战最少步数和最短时间！</li>
        </ul>
    </div>

    <div class="win-message" id="winMessage">
        <h2>🎉 恭喜完成!</h2>
        <p>用时: <span id="finalTime"></span></p>
        <p>步数: <span id="finalMoves"></span></p>
        <button class="btn" onclick="startGame()">再玩一次</button>
    </div>

    <script>
        const emojis = ['🍎', '🍌', '🍇', '🍊', '🍓', '🍑', '🍍', '🥝', '🍒', '🍉', '🥥', '🍋', '🍐', '🍈', '🍏', '🥭', '🫐', '🍅'];
        let cards = [], flippedCards = [], matchedPairs = 0, moves = 0;
        let timer = 0, timerInterval = null, gameActive = false, currentDiff = 'easy';

        function initGame() {
            const board = document.getElementById('board');
            const diff = document.querySelector('input[name="diff"]:checked').value;
            currentDiff = diff;
            const cols = diff === 'easy' ? 4 : 6;
            const rows = diff === 'easy' ? 4 : 6;
            const totalCards = cols * rows;
            const pairsNeeded = totalCards / 2;
            
            board.style.gridTemplateColumns = `repeat(${cols}, ${window.innerWidth < 600 ? 70 : 80}px)`;
            
            const gameEmojis = emojis.slice(0, pairsNeeded);
            cards = [...gameEmojis, ...gameEmojis];
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            
            flippedCards = []; matchedPairs = 0; moves = 0; timer = 0; gameActive = true;
            clearInterval(timerInterval);
            document.getElementById('moves').textContent = '0';
            document.getElementById('time').textContent = '00:00';
            document.getElementById('winMessage').style.display = 'none';
            
            timerInterval = setInterval(() => {
                timer++;
                const mins = String(Math.floor(timer / 60)).padStart(2, '0');
                const secs = String(timer % 60).padStart(2, '0');
                document.getElementById('time').textContent = `${mins}:${secs}`;
            }, 1000);
            renderBoard();
        }

        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            cards.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.innerHTML = `<div class="front">❓</div><div class="back">${emoji}</div>`;
                card.onclick = () => flipCard(index);
                card.ontouchstart = (e) => { e.preventDefault(); flipCard(index); };
                board.appendChild(card);
            });
        }

        function flipCard(index) {
            if (!gameActive) return;
            const cardElements = document.querySelectorAll('.card');
            const card = cardElements[index];
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;
            
            card.classList.add('flipped');
            flippedCards.push({ index, emoji: cards[index] });
            
            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            const [first, second] = flippedCards;
            const cardElements = document.querySelectorAll('.card');
            
            if (first.emoji === second.emoji) {
                setTimeout(() => {
                    cardElements[first.index].classList.add('matched');
                    cardElements[second.index].classList.add('matched');
                    matchedPairs++;
                    flippedCards = [];
                    if (matchedPairs === cards.length / 2) gameWin();
                }, 500);
            } else {
                setTimeout(() => {
                    cardElements[first.index].classList.remove('flipped');
                    cardElements[second.index].classList.remove('flipped');
                    flippedCards = [];
                }, 1000);
            }
        }

        function gameWin() {
            gameActive = false;
            clearInterval(timerInterval);
            const mins = String(Math.floor(timer / 60)).padStart(2, '0');
            const secs = String(timer % 60).padStart(2, '0');
            document.getElementById('finalTime').textContent = `${mins}:${secs}`;
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('winMessage').style.display = 'block';
        }

        function startGame() { initGame(); }

        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') location.href = '../index.html'; });
        initGame();
    </script>
</body>
</html>
