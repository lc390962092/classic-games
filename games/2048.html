<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048</title>
    <style>
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            background: linear-gradient(135deg, #faf8ef 0%, #e8e4d9 100%);
            font-family: 'Segoe UI', sans-serif;
            color: #776e65;
            padding: 10px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 2.5em;
            margin: 5px 0;
            color: #776e65;
        }
        .header {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
        }
        .score-box {
            background: #bbada0;
            padding: 8px 20px;
            border-radius: 8px;
            text-align: center;
            color: white;
        }
        .score-box span {
            display: block;
            font-size: 0.75em;
            text-transform: uppercase;
        }
        .score-box strong {
            font-size: 1.3em;
        }
        .game-container {
            position: relative;
            background: #bbada0;
            padding: 12px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            touch-action: none;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(4, 80px);
            gap: 12px;
        }
        .grid-cell {
            background: rgba(238, 228, 218, 0.35);
            border-radius: 5px;
        }
        .tile {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            font-weight: bold;
            transition: all 0.15s ease;
            animation: appear 0.2s ease;
        }
        @keyframes appear {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 1.5em; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 1.5em; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 1.5em; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 1.2em; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 1.2em; }
        .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 1.1em; }
        
        .controls {
            margin-top: 15px;
            text-align: center;
        }
        .btn {
            background: #8f7a66;
            border: none;
            color: #f9f6f2;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95em;
            margin: 3px;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .btn:active { transform: scale(0.95); }
        .btn:hover { background: #9f8a76; }
        .game-over {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(238, 228, 218, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            display: none;
            z-index: 10;
        }
        .game-over h2 { font-size: 2em; margin-bottom: 10px; }
        .win h2 { color: #edc22e; }
        .lose h2 { color: #776e65; }
        
        /* 虚拟方向键 */
        .dpad {
            display: none;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(3, 60px);
            gap: 8px;
            margin-top: 15px;
            justify-content: center;
        }
        .dpad-btn {
            background: rgba(143, 122, 102, 0.2);
            border: 2px solid rgba(143, 122, 102, 0.4);
            border-radius: 10px;
            color: #776e65;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(143, 122, 102, 0.4); }
        .dpad-up { grid-column: 2; }
        .dpad-left { grid-column: 1; grid-row: 2; }
        .dpad-right { grid-column: 3; grid-row: 2; }
        .dpad-down { grid-column: 2; grid-row: 3; }
        
        /* 游戏说明 */
        .game-help {
            background: rgba(255,255,255,0.7);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            max-width: 400px;
            text-align: left;
            font-size: 0.9em;
        }
        .game-help h3 { margin: 0 0 10px 0; color: #8f7a66; }
        .game-help ul { margin: 0; padding-left: 20px; }
        .game-help li { margin: 5px 0; }
        
        @media (max-width: 450px) {
            h1 { font-size: 2em; }
            .grid-container { grid-template-columns: repeat(4, 65px); grid-template-rows: repeat(4, 65px); gap: 10px; }
            .tile { width: 65px; height: 65px; font-size: 1.5em; }
            .tile-128, .tile-256, .tile-512 { font-size: 1.2em; }
            .tile-1024, .tile-2048 { font-size: 1em; }
            .dpad { display: grid; }
        }
    </style>
</head>
<body>
    <h1>2048</h1>
    <div class="header">
        <div class="score-box">
            <span>得分</span>
            <strong id="score">0</strong>
        </div>
        <div class="score-box">
            <span>最高分</span>
            <strong id="best">0</strong>
        </div>
    </div>

    <div class="game-container" id="gameContainer">
        <div class="grid-container">
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>
        <div id="tiles"></div>
        
        <div class="game-over" id="gameOver">
            <h2 id="gameOverText">游戏结束!</h2>
            <button class="btn" onclick="startGame()">再试一次</button>
        </div>
    </div>
    
    <!-- 虚拟方向键 -->
    <div class="dpad">
        <div class="dpad-btn dpad-up" ontouchstart="handleSwipe('up')">▲</div>
        <div class="dpad-btn dpad-left" ontouchstart="handleSwipe('left')">◀</div>
        <div class="dpad-btn dpad-right" ontouchstart="handleSwipe('right')">▶</div>
        <div class="dpad-btn dpad-down" ontouchstart="handleSwipe('down')">▼</div>
    </div>

    <div class="controls">
        <button class="btn" onclick="startGame()">新游戏</button>
        <button class="btn" onclick="location.href='../index.html'" style="background: #f65e3b;">返回主页</button>
    </div>
    
    <div class="game-help">
        <h3>🎮 游戏说明</h3>
        <ul>
            <li>滑动所有方块向一个方向移动</li>
            <li>相同数字的方块碰撞时会合并</li>
            <li>每次移动后会在空白处生成一个新方块(2或4)</li>
            <li>目标是合成 2048 方块！</li>
            <li>当无法移动时游戏结束</li>
        </ul>
    </div>

    <script>
        let board = [];
        let score = 0;
        let bestScore = localStorage.getItem('2048best') || 0;
        let hasWon = false;
        
        document.getElementById('best').textContent = bestScore;

        function initBoard() {
            board = Array(4).fill(null).map(() => Array(4).fill(0));
            score = 0;
            hasWon = false;
            updateScore();
            addRandomTile();
            addRandomTile();
            render();
            document.getElementById('gameOver').style.display = 'none';
        }

        function addRandomTile() {
            const empty = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] === 0) empty.push({r, c});
                }
            }
            if (empty.length > 0) {
                const {r, c} = empty[Math.floor(Math.random() * empty.length)];
                board[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function render() {
            const container = document.getElementById('tiles');
            container.innerHTML = '';
            const tileSize = window.innerWidth < 450 ? 77 : 92;
            const gap = window.innerWidth < 450 ? 10 : 12;
            
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] !== 0) {
                        const tile = document.createElement('div');
                        tile.className = `tile tile-${board[r][c]} ${board[r][c] > 2048 ? 'tile-super' : ''}`;
                        tile.textContent = board[r][c];
                        tile.style.left = `${c * tileSize + gap}px`;
                        tile.style.top = `${r * tileSize + gap}px`;
                        container.appendChild(tile);
                    }
                }
            }
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('2048best', bestScore);
                document.getElementById('best').textContent = bestScore;
            }
        }

        function slideRowLeft(row) {
            let filtered = row.filter(val => val !== 0);
            for (let i = 0; i < filtered.length - 1; i++) {
                if (filtered[i] === filtered[i + 1]) {
                    filtered[i] *= 2;
                    score += filtered[i];
                    if (filtered[i] === 2048 && !hasWon) {
                        hasWon = true;
                        showGameOver(true);
                    }
                    filtered[i + 1] = 0;
                }
            }
            filtered = filtered.filter(val => val !== 0);
            while (filtered.length < 4) filtered.push(0);
            return filtered;
        }

        function moveLeft() {
            let moved = false;
            for (let r = 0; r < 4; r++) {
                const oldRow = [...board[r]];
                board[r] = slideRowLeft(board[r]);
                if (oldRow.toString() !== board[r].toString()) moved = true;
            }
            return moved;
        }

        function moveRight() {
            let moved = false;
            for (let r = 0; r < 4; r++) {
                const oldRow = [...board[r]];
                board[r] = slideRowLeft(board[r].reverse()).reverse();
                if (oldRow.toString() !== board[r].toString()) moved = true;
            }
            return moved;
        }

        function moveUp() {
            let moved = false;
            for (let c = 0; c < 4; c++) {
                const col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                const oldCol = [...col];
                const newCol = slideRowLeft(col);
                for (let r = 0; r < 4; r++) board[r][c] = newCol[r];
                if (oldCol.toString() !== newCol.toString()) moved = true;
            }
            return moved;
        }

        function moveDown() {
            let moved = false;
            for (let c = 0; c < 4; c++) {
                const col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                const oldCol = [...col];
                const newCol = slideRowLeft(col.reverse()).reverse();
                for (let r = 0; r < 4; r++) board[r][c] = newCol[r];
                if (oldCol.toString() !== newCol.toString()) moved = true;
            }
            return moved;
        }

        function canMove() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] === 0) return true;
                }
            }
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (c < 3 && board[r][c] === board[r][c + 1]) return true;
                    if (r < 3 && board[r][c] === board[r + 1][c]) return true;
                }
            }
            return false;
        }

        function showGameOver(win) {
            const overlay = document.getElementById('gameOver');
            const text = document.getElementById('gameOverText');
            overlay.className = 'game-over ' + (win ? 'win' : 'lose');
            text.textContent = win ? '你赢了! 🎉' : '游戏结束!';
            overlay.style.display = 'flex';
        }

        function startGame() {
            initBoard();
        }

        // 虚拟按键控制
        function handleSwipe(direction) {
            if (document.getElementById('gameOver').style.display === 'flex') return;
            let moved = false;
            switch(direction) {
                case 'left': moved = moveLeft(); break;
                case 'right': moved = moveRight(); break;
                case 'up': moved = moveUp(); break;
                case 'down': moved = moveDown(); break;
            }
            if (moved) {
                addRandomTile();
                updateScore();
                render();
                if (!canMove()) setTimeout(() => showGameOver(false), 300);
            }
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('gameOver').style.display === 'flex') return;
            if (e.key === 'Escape') { location.href = '../index.html'; return; }

            let moved = false;
            switch(e.key) {
                case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); moved = moveLeft(); break;
                case 'ArrowRight': case 'd': case 'D': e.preventDefault(); moved = moveRight(); break;
                case 'ArrowUp': case 'w': case 'W': e.preventDefault(); moved = moveUp(); break;
                case 'ArrowDown': case 's': case 'S': e.preventDefault(); moved = moveDown(); break;
            }
            if (moved) {
                addRandomTile();
                updateScore();
                render();
                if (!canMove()) setTimeout(() => showGameOver(false), 300);
            }
        });

        // 触摸滑动支持
        let touchStartX = 0, touchStartY = 0;
        const gameContainer = document.getElementById('gameContainer');
        gameContainer.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: true});
        
        gameContainer.addEventListener('touchend', (e) => {
            if (document.getElementById('gameOver').style.display === 'flex') return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return;
            
            let moved = false;
            if (Math.abs(dx) > Math.abs(dy)) {
                moved = dx > 0 ? moveRight() : moveLeft();
            } else {
                moved = dy > 0 ? moveDown() : moveUp();
            }
            if (moved) {
                addRandomTile();
                updateScore();
                render();
                if (!canMove()) setTimeout(() => showGameOver(false), 300);
            }
        }, {passive: true});
        
        window.addEventListener('resize', render);
        initBoard();
    </script>
</body>
</html>
