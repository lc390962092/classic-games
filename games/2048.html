<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #faf8ef 0%, #e8e4d9 100%);
            font-family: 'Segoe UI', sans-serif;
            color: #776e65;
        }
        h1 {
            font-size: 3em;
            margin: 10px 0;
            color: #776e65;
        }
        .header {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
        }
        .score-box {
            background: #bbada0;
            padding: 10px 25px;
            border-radius: 10px;
            text-align: center;
            color: white;
        }
        .score-box span {
            display: block;
            font-size: 0.8em;
            text-transform: uppercase;
        }
        .score-box strong {
            font-size: 1.5em;
        }
        .game-container {
            position: relative;
            background: #bbada0;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 15px;
        }
        .grid-cell {
            background: rgba(238, 228, 218, 0.35);
            border-radius: 5px;
        }
        .tile {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: bold;
            transition: all 0.15s ease;
            animation: appear 0.2s ease;
        }
        @keyframes appear {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 1.8em; box-shadow: 0 0 10px rgba(237, 207, 114, 0.3); }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 1.8em; box-shadow: 0 0 15px rgba(237, 204, 97, 0.4); }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 1.8em; box-shadow: 0 0 20px rgba(237, 200, 80, 0.5); }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 1.5em; box-shadow: 0 0 25px rgba(237, 197, 63, 0.6); }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 1.5em; box-shadow: 0 0 30px rgba(237, 194, 46, 0.7); }
        .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 1.3em; }
        
        .controls {
            margin-top: 25px;
            text-align: center;
        }
        .btn {
            background: #8f7a66;
            border: none;
            color: #f9f6f2;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin: 5px;
            transition: all 0.2s;
        }
        .btn:hover { background: #9f8a76; }
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            display: none;
        }
        .game-over h2 { font-size: 2.5em; margin-bottom: 15px; }
        .win h2 { color: #edc22e; }
        .lose h2 { color: #776e65; }
        .instructions {
            margin-top: 20px;
            color: #8f7a66;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>2048</h1>
    <div class="header">
        <div class="score-box">
            <span>得分</span>
            <strong id="score">0</strong>
        </div>
        <div class="score-box">
            <span>最高分</span>
            <strong id="best">0</strong>
        </div>
    </div>

    <div class="game-container" id="gameContainer">
        <div class="grid-container">
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
        </div>
        <div id="tiles"></div>
        
        <div class="game-over" id="gameOver">
            <h2 id="gameOverText">游戏结束!</h2>
            <button class="btn" onclick="startGame()">再试一次</button>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="startGame()">新游戏</button>
        <button class="btn" onclick="location.href='../index.html'" style="background: #f65e3b;">返回主页</button>
    </div>

    <div class="instructions">
        <p>🎮 使用方向键或 WASD 滑动方块</p>
        <p>🎯 合并相同数字，目标是合成 2048！</p>
        <p>🔄 ESC 返回主页</p>
    </div>

    <script>
        let board = [];
        let score = 0;
        let bestScore = localStorage.getItem('2048best') || 0;
        let hasWon = false;
        
        document.getElementById('best').textContent = bestScore;

        function initBoard() {
            board = Array(4).fill(null).map(() => Array(4).fill(0));
            score = 0;
            hasWon = false;
            updateScore();
            addRandomTile();
            addRandomTile();
            render();
            document.getElementById('gameOver').style.display = 'none';
        }

        function addRandomTile() {
            const empty = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] === 0) empty.push({r, c});
                }
            }
            if (empty.length > 0) {
                const {r, c} = empty[Math.floor(Math.random() * empty.length)];
                board[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function render() {
            const container = document.getElementById('tiles');
            container.innerHTML = '';
            
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] !== 0) {
                        const tile = document.createElement('div');
                        tile.className = `tile tile-${board[r][c]} ${board[r][c] > 2048 ? 'tile-super' : ''}`;
                        tile.textContent = board[r][c];
                        tile.style.left = `${c * 115 + 15}px`;
                        tile.style.top = `${r * 115 + 15}px`;
                        container.appendChild(tile);
                    }
                }
            }
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('2048best', bestScore);
                document.getElementById('best').textContent = bestScore;
            }
        }

        function slideRowLeft(row) {
            // 过滤掉0
            let filtered = row.filter(val => val !== 0);
            // 合并
            for (let i = 0; i < filtered.length - 1; i++) {
                if (filtered[i] === filtered[i + 1]) {
                    filtered[i] *= 2;
                    score += filtered[i];
                    if (filtered[i] === 2048 && !hasWon) {
                        hasWon = true;
                        showGameOver(true);
                    }
                    filtered[i + 1] = 0;
                }
            }
            // 再次过滤并补0
            filtered = filtered.filter(val => val !== 0);
            while (filtered.length < 4) filtered.push(0);
            return filtered;
        }

        function moveLeft() {
            let moved = false;
            for (let r = 0; r < 4; r++) {
                const oldRow = [...board[r]];
                board[r] = slideRowLeft(board[r]);
                if (oldRow.toString() !== board[r].toString()) moved = true;
            }
            return moved;
        }

        function moveRight() {
            let moved = false;
            for (let r = 0; r < 4; r++) {
                const oldRow = [...board[r]];
                board[r] = slideRowLeft(board[r].reverse()).reverse();
                if (oldRow.toString() !== board[r].toString()) moved = true;
            }
            return moved;
        }

        function moveUp() {
            let moved = false;
            for (let c = 0; c < 4; c++) {
                const col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                const oldCol = [...col];
                const newCol = slideRowLeft(col);
                for (let r = 0; r < 4; r++) {
                    board[r][c] = newCol[r];
                }
                if (oldCol.toString() !== newCol.toString()) moved = true;
            }
            return moved;
        }

        function moveDown() {
            let moved = false;
            for (let c = 0; c < 4; c++) {
                const col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                const oldCol = [...col];
                const newCol = slideRowLeft(col.reverse()).reverse();
                for (let r = 0; r < 4; r++) {
                    board[r][c] = newCol[r];
                }
                if (oldCol.toString() !== newCol.toString()) moved = true;
            }
            return moved;
        }

        function canMove() {
            // 检查是否有空位
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] === 0) return true;
                }
            }
            // 检查是否可以合并
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (c < 3 && board[r][c] === board[r][c + 1]) return true;
                    if (r < 3 && board[r][c] === board[r + 1][c]) return true;
                }
            }
            return false;
        }

        function showGameOver(win) {
            const overlay = document.getElementById('gameOver');
            const text = document.getElementById('gameOverText');
            overlay.className = 'game-over ' + (win ? 'win' : 'lose');
            text.textContent = win ? '你赢了! 🎉' : '游戏结束!';
            overlay.style.display = 'flex';
        }

        function startGame() {
            initBoard();
        }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('gameOver').style.display === 'flex') return;
            
            if (e.key === 'Escape') {
                location.href = '../index.html';
                return;
            }

            let moved = false;
            switch(e.key) {
                case 'ArrowLeft': case 'a': case 'A':
                    e.preventDefault();
                    moved = moveLeft();
                    break;
                case 'ArrowRight': case 'd': case 'D':
                    e.preventDefault();
                    moved = moveRight();
                    break;
                case 'ArrowUp': case 'w': case 'W':
                    e.preventDefault();
                    moved = moveUp();
                    break;
                case 'ArrowDown': case 's': case 'S':
                    e.preventDefault();
                    moved = moveDown();
                    break;
            }
            
            if (moved) {
                addRandomTile();
                updateScore();
                render();
                if (!canMove()) {
                    setTimeout(() => showGameOver(false), 300);
                }
            }
        });

        // 触摸支持
        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        document.addEventListener('touchend', (e) => {
            if (document.getElementById('gameOver').style.display === 'flex') return;
            
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            
            if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return;
            
            let moved = false;
            if (Math.abs(dx) > Math.abs(dy)) {
                moved = dx > 0 ? moveRight() : moveLeft();
            } else {
                moved = dy > 0 ? moveDown() : moveUp();
            }
            
            if (moved) {
                addRandomTile();
                updateScore();
                render();
                if (!canMove()) {
                    setTimeout(() => showGameOver(false), 300);
                }
            }
        });

        initBoard();
    </script>
</body>
</html>
