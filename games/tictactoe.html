<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>井字棋</title>
    <style>
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            padding: 10px;
            box-sizing: border-box;
        }
        h1 { font-size: 2em; margin: 5px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .game-wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }
        .board-container { text-align: center; }
        .status {
            font-size: 1.1em;
            margin-bottom: 15px;
            padding: 12px 25px;
            background: rgba(255,255,255,0.2);
            border-radius: 25px;
            min-height: 25px;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 8px;
            background: rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            touch-action: manipulation;
        }
        .cell {
            background: white;
            border: none;
            border-radius: 8px;
            font-size: 2.5em;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #333;
            touch-action: manipulation;
        }
        .cell:active:not(:disabled) { transform: scale(0.95); background: #f0f0f0; }
        .cell:hover:not(:disabled) { transform: scale(0.95); background: #f0f0f0; }
        .cell:disabled { cursor: not-allowed; }
        .cell.x { color: #ff6b6b; }
        .cell.o { color: #4ecdc4; }
        .cell.win { background: #ffe66d; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .side-panel {
            background: rgba(255,255,255,0.15);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            max-width: 250px;
        }
        .side-panel h3 { margin-top: 0; text-align: center; }
        .mode-select { margin: 12px 0; }
        .mode-select label {
            display: block;
            padding: 10px;
            margin: 5px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
        }
        .mode-select label:active { background: rgba(255,255,255,0.25); }
        .mode-select input { margin-right: 10px; }
        .score-board {
            margin: 15px 0;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }
        .score-board div { display: flex; justify-content: space-between; margin: 6px 0; font-size: 1em; }
        .btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95em;
            margin: 4px 0;
            width: 100%;
            transition: all 0.3s;
            touch-action: manipulation;
        }
        .btn:active { background: white; color: #667eea; transform: scale(0.98); }
        .difficulty { margin-top: 12px; }
        .difficulty select { width: 100%; padding: 8px; border-radius: 5px; border: none; font-size: 0.95em; }
        
        /* 游戏说明 */
        .game-help {
            background: rgba(255,255,255,0.15);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            max-width: 350px;
            text-align: left;
            font-size: 0.9em;
        }
        .game-help h3 { margin: 0 0 10px 0; color: #ffe66d; }
        .game-help ul { margin: 0; padding-left: 20px; }
        .game-help li { margin: 5px 0; }
        
        @media (max-width: 600px) {
            h1 { font-size: 1.6em; }
            #board { grid-template-columns: repeat(3, 85px); grid-template-rows: repeat(3, 85px); gap: 6px; padding: 10px; }
            .cell { font-size: 2em; }
            .side-panel { padding: 15px; max-width: 280px; }
            .game-wrapper { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <h1>⭕ 井字棋 ❌</h1>
    
    <div class="game-wrapper">
        <div class="board-container">
            <div class="status" id="status">X 的回合</div>
            <div id="board"></div>
        </div>
        
        <div class="side-panel">
            <h3>游戏设置</h3>
            
            <div class="mode-select">
                <label><input type="radio" name="mode" value="pvp" checked> 双人对战</label>
                <label><input type="radio" name="mode" value="pve"> 挑战 AI</label>
            </div>
            
            <div class="difficulty" id="difficultySelect">
                <select id="aiLevel">
                    <option value="easy">简单 AI</option>
                    <option value="hard" selected>困难 AI</option>
                </select>
            </div>
            
            <div class="score-board">
                <div><span>X 获胜:</span> <strong id="xWins">0</strong></div>
                <div><span>平局:</span> <strong id="draws">0</strong></div>
                <div><span>O 获胜:</span> <strong id="oWins">0</strong></div>
            </div>
            
            <button class="btn" onclick="resetGame()">重新开始</button>
            <button class="btn" onclick="resetScores()">重置比分</button>
            <button class="btn" onclick="location.href='../index.html'">返回主页</button>
        </div>
    </div>
    
    <div class="game-help">
        <h3>🎮 游戏说明</h3>
        <ul>
            <li>轮流在3×3格子中放置 X 或 O</li>
            <li>率先连成一条线（横/竖/斜）即获胜</li>
            <li>可选择双人对战或挑战AI</li>
            <li>困难AI使用智能算法，极具挑战性</li>
        </ul>
    </div>

    <script>
        let board = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let gameActive = true;
        let mode = 'pvp';
        let aiLevel = 'hard';
        let scores = { X: 0, O: 0, draws: 0 };

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        function initBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            board.forEach((cell, index) => {
                const btn = document.createElement('button');
                btn.className = 'cell';
                btn.dataset.index = index;
                btn.textContent = cell;
                btn.onclick = () => handleMove(index);
                btn.ontouchstart = (e) => { e.preventDefault(); handleMove(index); };
                if (cell) {
                    btn.classList.add(cell.toLowerCase());
                    btn.disabled = true;
                }
                boardEl.appendChild(btn);
            });
        }

        function handleMove(index) {
            if (!gameActive || board[index]) return;
            board[index] = currentPlayer;
            initBoard();
            if (checkWin()) {
                endGame(currentPlayer + ' 获胜! 🎉');
                highlightWin();
                scores[currentPlayer]++;
                updateScores();
                return;
            }
            if (board.every(cell => cell !== '')) {
                endGame('平局! 🤝');
                scores.draws++;
                updateScores();
                return;
            }
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            document.getElementById('status').textContent = currentPlayer + ' 的回合';
            if (mode === 'pve' && currentPlayer === 'O' && gameActive) {
                setTimeout(aiMove, 400);
            }
        }

        function aiMove() {
            if (!gameActive) return;
            let move;
            if (aiLevel === 'easy') {
                const empty = board.map((v, i) => v === '' ? i : null).filter(v => v !== null);
                move = empty[Math.floor(Math.random() * empty.length)];
            } else {
                move = getBestMove();
            }
            if (move !== undefined) handleMove(move);
        }

        function getBestMove() {
            let bestScore = -Infinity, move;
            for (let i = 0; i < 9; i++) {
                if (board[i] === '') {
                    board[i] = 'O';
                    let score = minimax(board, 0, false);
                    board[i] = '';
                    if (score > bestScore) { bestScore = score; move = i; }
                }
            }
            return move;
        }

        function minimax(board, depth, isMaximizing) {
            const result = checkWinner();
            if (result === 'O') return 10 - depth;
            if (result === 'X') return depth - 10;
            if (board.every(cell => cell !== '')) return 0;
            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === '') {
                        board[i] = 'O';
                        let score = minimax(board, depth + 1, false);
                        board[i] = '';
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === '') {
                        board[i] = 'X';
                        let score = minimax(board, depth + 1, true);
                        board[i] = '';
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        function checkWinner() {
            for (let condition of winningConditions) {
                const [a, b, c] = condition;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) return board[a];
            }
            return null;
        }
        function checkWin() { return checkWinner() !== null; }

        function highlightWin() {
            const winner = checkWinner();
            if (!winner) return;
            for (let condition of winningConditions) {
                const [a, b, c] = condition;
                if (board[a] === winner && board[b] === winner && board[c] === winner) {
                    const cells = document.querySelectorAll('.cell');
                    cells[a].classList.add('win');
                    cells[b].classList.add('win');
                    cells[c].classList.add('win');
                    break;
                }
            }
        }

        function endGame(message) {
            gameActive = false;
            document.getElementById('status').textContent = message;
        }

        function updateScores() {
            document.getElementById('xWins').textContent = scores.X;
            document.getElementById('oWins').textContent = scores.O;
            document.getElementById('draws').textContent = scores.draws;
        }

        function resetGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            gameActive = true;
            document.getElementById('status').textContent = 'X 的回合';
            initBoard();
        }

        function resetScores() { scores = { X: 0, O: 0, draws: 0 }; updateScores(); }

        document.querySelectorAll('input[name="mode"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                mode = e.target.value;
                document.getElementById('difficultySelect').style.display = mode === 'pve' ? 'block' : 'none';
                resetGame();
            });
        });

        document.getElementById('aiLevel').addEventListener('change', (e) => { aiLevel = e.target.value; });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') location.href = '../index.html'; });

        initBoard();
    </script>
</body>
</html>
