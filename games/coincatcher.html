<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>接金币</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f39c12 0%, #e74c3c 100%);
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        h1 { font-size: 2.5em; margin: 10px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .game-container {
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border-radius: 10px;
            overflow: hidden;
        }
        canvas {
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            display: block;
        }
        .info {
            display: flex;
            gap: 30px;
            margin: 15px 0;
            font-size: 1.2em;
        }
        .info span {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 25px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .controls {
            margin-top: 20px;
            text-align: center;
            color: rgba(255,255,255,0.9);
        }
        .btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            margin: 5px;
            transition: all 0.3s;
        }
        .btn:hover {
            background: white;
            color: #e74c3c;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            display: none;
            border: 3px solid #f1c40f;
        }
        .game-over h2 { color: #f1c40f; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>🪙 接金币</h1>
    <div class="info">
        <span>得分: <strong id="score">0</strong></span>
        <span>生命: <strong id="lives">❤️❤️❤️</strong></span>
        <span>时间: <strong id="time">0</strong>秒</span>
    </div>
    <div class="game-container">
        <canvas id="game" width="600" height="700"></canvas>
        <div class="game-over" id="gameOver">
            <h2>游戏结束!</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <p>生存时间: <span id="finalTime">0</span>秒</p>
            <button class="btn" onclick="startGame()">再来一局</button>
        </div>
    </div>
    <div class="controls">
        <p>🎮 ← → 或 A/D 移动篮子接住金币</p>
        <p>💰 金币+10分 | ⚡ 道具+50分 | 💣 炸弹-1生命</p>
        <button class="btn" onclick="startGame()">开始游戏</button>
        <button class="btn" onclick="location.href='../index.html'">返回主页</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        let basket, items, particles, clouds;
        let score = 0;
        let lives = 3;
        let gameTime = 0;
        let gameRunning = false;
        let animationId;
        let itemSpawnTimer = 0;
        let difficultyMultiplier = 1;

        function initGame() {
            // 篮子
            basket = {
                x: 250,
                y: 630,
                width: 100,
                height: 30,
                speed: 8
            };

            items = [];
            particles = [];
            clouds = [];
            
            // 初始化云朵
            for (let i = 0; i < 5; i++) {
                clouds.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * 200,
                    width: 60 + Math.random() * 40,
                    speed: 0.2 + Math.random() * 0.3
                });
            }

            score = 0;
            lives = 3;
            gameTime = 0;
            itemSpawnTimer = 0;
            difficultyMultiplier = 1;
            updateUI();
        }

        function createItem() {
            const types = ['coin', 'coin', 'coin', 'coin', 'gem', 'bomb', 'bomb'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            const item = {
                x: Math.random() * (canvas.width - 40) + 20,
                y: -40,
                type: type,
                speed: (2 + Math.random() * 2) * difficultyMultiplier,
                rotation: 0
            };
            
            items.push(item);
        }

        function createParticles(x, y, color, count = 5) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    dx: (Math.random() - 0.5) * 8,
                    dy: (Math.random() - 0.5) * 8,
                    life: 1,
                    color: color,
                    size: Math.random() * 6 + 2
                });
            }
        }

        function draw() {
            // 清空画布（天空渐变）
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(0.5, '#E0F6FF');
            gradient.addColorStop(1, '#FFE5B4');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制云朵
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            clouds.forEach(cloud => {
                ctx.beginPath();
                ctx.ellipse(cloud.x, cloud.y, cloud.width, cloud.width * 0.6, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cloud.x + 20, cloud.y - 10, cloud.width * 0.7, cloud.width * 0.5, 0, 0, Math.PI * 2);
                ctx.fill();
            });

            // 绘制地面
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, 660, canvas.width, 40);
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, 655, canvas.width, 10);

            // 绘制篮子
            ctx.fillStyle = '#8B4513';
            ctx.beginPath();
            ctx.moveTo(basket.x, basket.y);
            ctx.lineTo(basket.x + basket.width, basket.y);
            ctx.lineTo(basket.x + basket.width - 10, basket.y + basket.height);
            ctx.lineTo(basket.x + 10, basket.y + basket.height);
            ctx.closePath();
            ctx.fill();
            
            // 篮子纹理
            ctx.strokeStyle = '#654321';
            ctx.lineWidth = 2;
            for (let i = 10; i < basket.width; i += 20) {
                ctx.beginPath();
                ctx.moveTo(basket.x + i, basket.y);
                ctx.lineTo(basket.x + i - 5, basket.y + basket.height);
                ctx.stroke();
            }

            // 绘制物品
            items.forEach(item => {
                ctx.save();
                ctx.translate(item.x, item.y);
                item.rotation += 0.05;
                ctx.rotate(item.rotation);
                
                if (item.type === 'coin') {
                    // 金币
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.arc(0, 0, 15, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#FFA500';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.fillStyle = '#FFA500';
                    ctx.font = 'bold 16px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('$', 0, 0);
                } else if (item.type === 'gem') {
                    // 宝石
                    ctx.fillStyle = '#9B59B6';
                    ctx.beginPath();
                    ctx.moveTo(0, -15);
                    ctx.lineTo(13, -5);
                    ctx.lineTo(13, 10);
                    ctx.lineTo(0, 18);
                    ctx.lineTo(-13, 10);
                    ctx.lineTo(-13, -5);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = '#8E44AD';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else if (item.type === 'bomb') {
                    // 炸弹
                    ctx.fillStyle = '#2C3E50';
                    ctx.beginPath();
                    ctx.arc(0, 5, 12, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#E74C3C';
                    ctx.fillRect(-3, -18, 6, 10);
                    ctx.fillStyle = '#F39C12';
                    ctx.beginPath();
                    ctx.moveTo(-2, -18);
                    ctx.lineTo(2, -22);
                    ctx.lineTo(5, -18);
                    ctx.closePath();
                    ctx.fill();
                }
                
                ctx.restore();
            });

            // 绘制粒子
            particles = particles.filter(p => {
                p.x += p.dx;
                p.y += p.dy;
                p.life -= 0.02;
                if (p.life > 0) {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    return true;
                }
                return false;
            });
        }

        function update() {
            if (!gameRunning) return;

            gameTime += 1/60;
            if (Math.floor(gameTime) % 10 === 0 && gameTime % 1 < 0.02) {
                difficultyMultiplier += 0.1;
            }

            // 移动云朵
            clouds.forEach(cloud => {
                cloud.x += cloud.speed;
                if (cloud.x > canvas.width + 50) {
                    cloud.x = -50;
                }
            });

            // 生成新物品
            itemSpawnTimer++;
            if (itemSpawnTimer > 60 / difficultyMultiplier) {
                createItem();
                itemSpawnTimer = 0;
            }

            // 更新物品
            items = items.filter(item => {
                item.y += item.speed;

                // 碰撞检测
                if (item.y + 20 > basket.y &&
                    item.y - 20 < basket.y + basket.height &&
                    item.x > basket.x - 10 &&
                    item.x < basket.x + basket.width + 10) {
                    
                    if (item.type === 'coin') {
                        score += 10;
                        createParticles(item.x, item.y, '#FFD700', 8);
                    } else if (item.type === 'gem') {
                        score += 50;
                        createParticles(item.x, item.y, '#9B59B6', 12);
                    } else if (item.type === 'bomb') {
                        lives--;
                        createParticles(item.x, item.y, '#E74C3C', 15);
                    }
                    
                    updateUI();
                    
                    if (lives <= 0) {
                        gameOver();
                    }
                    return false;
                }

                return item.y < canvas.height + 50;
            });

            document.getElementById('time').textContent = Math.floor(gameTime);
            draw();
            animationId = requestAnimationFrame(update);
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = '❤️'.repeat(Math.max(0, lives));
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalTime').textContent = Math.floor(gameTime);
            document.getElementById('gameOver').style.display = 'block';
        }

        function startGame() {
            initGame();
            gameRunning = true;
            document.getElementById('gameOver').style.display = 'none';
            if (animationId) cancelAnimationFrame(animationId);
            update();
        }

        // 键盘控制
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === 'Escape') {
                location.href = '../index.html';
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        function moveBasket() {
            if (gameRunning) {
                if ((keys['ArrowLeft'] || keys['a'] || keys['A']) && basket.x > 0) {
                    basket.x -= basket.speed;
                }
                if ((keys['ArrowRight'] || keys['d'] || keys['D']) && basket.x < canvas.width - basket.width) {
                    basket.x += basket.speed;
                }
            }
            requestAnimationFrame(moveBasket);
        }

        // 鼠标/触摸控制
        canvas.addEventListener('mousemove', (e) => {
            if (gameRunning) {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                basket.x = Math.max(0, Math.min(canvas.width - basket.width, x - basket.width / 2));
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            if (gameRunning) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const x = e.touches[0].clientX - rect.left;
                basket.x = Math.max(0, Math.min(canvas.width - basket.width, x - basket.width / 2));
            }
        });

        moveBasket();
        draw();
    </script>
</body>
</html>
