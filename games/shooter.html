<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飞机大战</title>
    <style>
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            padding: 10px;
            box-sizing: border-box;
        }
        h1 { font-size: 2em; margin: 5px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .game-wrapper {
            display: flex;
            gap: 15px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }
        .game-container {
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border-radius: 10px;
            overflow: hidden;
        }
        canvas {
            background: linear-gradient(180deg, #000428 0%, #004e92 100%);
            display: block;
            max-width: 100vw;
            touch-action: none;
        }
        .info {
            display: flex;
            gap: 15px;
            margin: 10px 0;
            font-size: 1em;
            flex-wrap: wrap;
            justify-content: center;
        }
        .info span {
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 20px;
        }
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .controls {
            text-align: center;
            color: #aaa;
            font-size: 0.9em;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: transform 0.2s;
            touch-action: manipulation;
        }
        .btn:active { transform: scale(0.95); }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            display: none;
            border: 2px solid #ff6b6b;
            z-index: 10;
        }
        .game-over h2 { color: #ff6b6b; margin-bottom: 15px; }
        
        /* 虚拟方向键 */
        .mobile-controls {
            display: none;
            margin-top: 15px;
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
        }
        .dpad-btn {
            background: rgba(102, 126, 234, 0.3);
            border: 2px solid rgba(255,255,255,0.5);
            color: white;
            border-radius: 10px;
            font-size: 1.5em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(102, 126, 234, 0.6); }
        .dpad-up { grid-column: 2; grid-row: 1; }
        .dpad-left { grid-column: 1; grid-row: 2; }
        .dpad-right { grid-column: 3; grid-row: 2; }
        .dpad-down { grid-column: 2; grid-row: 3; }
        
        .fire-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            border: 3px solid white;
            color: white;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        .fire-btn:active { transform: scale(0.95); }
        
        .mobile-controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 280px;
            margin-top: 15px;
        }
        
        /* 游戏说明 */
        .game-help {
            background: rgba(255,255,255,0.15);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            max-width: 350px;
            text-align: left;
            font-size: 0.9em;
        }
        .game-help h3 { margin: 0 0 10px 0; color: #ffe66d; font-size: 1.1em; }
        .game-help ul { margin: 0; padding-left: 20px; }
        .game-help li { margin: 5px 0; }
        
        @media (max-width: 600px) {
            h1 { font-size: 1.5em; }
            canvas { max-width: 95vw; }
            .info { font-size: 0.85em; }
            .controls { display: none; }
            .mobile-controls { display: flex; flex-direction: column; align-items: center; }
            .game-help { max-width: 95vw; font-size: 0.85em; }
        }
    </style>
</head>
<body>
    <h1>✈️ 飞机大战</h1>
    
    <div class="game-wrapper">
        <div class="game-main">
            <div class="info">
                <span>得分: <strong id="score">0</strong></span>
                <span>最高分: <strong id="highScore">0</strong></span>
                <span>生命: <strong id="lives">❤️❤️❤️</strong></span>
            </div>
            <div class="game-container">
                <canvas id="game" width="400" height="550"></canvas>
                <div class="game-over" id="gameOver">
                    <h2>游戏结束!</h2>
                    <p>最终得分: <span id="finalScore">0</span></p>
                    <button class="btn" onclick="startGame()">再来一局</button>
                </div>
            </div>
            
            <div class="controls">
                <p>🎮 ← → ↑ ↓ 或 WASD 移动 | 空格键射击</p>
                <p>💥 击毁敌机得分 | 💊 血包恢复生命</p>
                <button class="btn" onclick="startGame()">开始游戏</button>
                <button class="btn" onclick="location.href='../index.html'" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">返回主页</button>
            </div>
            
            <!-- 移动端控制 -->
            <div class="mobile-controls">
                <div class="mobile-controls-row">
                    <div class="dpad">
                        <div class="dpad-btn dpad-up" ontouchstart="handleTouch('up', true)" ontouchend="handleTouch('up', false)">▲</div>
                        <div class="dpad-btn dpad-left" ontouchstart="handleTouch('left', true)" ontouchend="handleTouch('left', false)">◀</div>
                        <div class="dpad-btn dpad-right" ontouchstart="handleTouch('right', true)" ontouchend="handleTouch('right', false)">▶</div>
                        <div class="dpad-btn dpad-down" ontouchstart="handleTouch('down', true)" ontouchend="handleTouch('down', false)">▼</div>
                    </div>
                    <div class="fire-btn" ontouchstart="handleFire(true)" ontouchend="handleFire(false)">🔥</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="game-help">
        <h3>🎮 游戏说明</h3>
        <ul>
            <li>拖动飞机或按方向键移动</li>
            <li>自动射击，击毁敌机得分</li>
            <li>避开敌机碰撞，损失生命</li>
            <li>拾取❤️血包恢复生命</li>
            <li>挑战最高分数！</li>
        </ul>
        <button class="btn" onclick="startGame()" style="margin-top:10px; width:100%;">开始游戏</button>
        <button class="btn" onclick="location.href='../index.html'" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); margin-top:5px; width:100%;">返回主页</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        let player, bullets, enemies, particles, stars, powerUps;
        let score = 0;
        let highScore = localStorage.getItem('shooterHighScore') || 0;
        let lives = 3;
        let gameRunning = false;
        let animationId;
        let enemySpawnTimer = 0;
        let powerUpSpawnTimer = 0;
        let canShoot = true;
        let autoShootTimer = 0;
        
        // 触摸控制状态
        let touchState = { up: false, down: false, left: false, right: false, fire: false };

        document.getElementById('highScore').textContent = highScore;

        function initGame() {
            player = {
                x: 175,
                y: 480,
                width: 50,
                height: 40,
                speed: 5,
                shootCooldown: 0
            };

            bullets = [];
            enemies = [];
            particles = [];
            powerUps = [];
            stars = [];
            
            for (let i = 0; i < 80; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 3 + 0.5,
                    brightness: Math.random()
                });
            }

            score = 0;
            lives = 3;
            enemySpawnTimer = 0;
            powerUpSpawnTimer = 0;
            touchState = { up: false, down: false, left: false, right: false, fire: false };
            updateUI();
        }

        function createBullet() {
            bullets.push({
                x: player.x + player.width / 2,
                y: player.y,
                speed: 10,
                width: 4,
                height: 15
            });
        }

        function createEnemy() {
            const types = ['basic', 'fast', 'tank'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            const enemy = {
                x: Math.random() * (canvas.width - 40) + 20,
                y: -50,
                type: type,
                width: type === 'tank' ? 50 : 40,
                height: type === 'tank' ? 40 : 35,
                speed: type === 'fast' ? 4 : (type === 'tank' ? 1.5 : 2.5),
                health: type === 'tank' ? 3 : 1,
                score: type === 'tank' ? 30 : (type === 'fast' ? 20 : 10)
            };
            
            enemies.push(enemy);
        }

        function createPowerUp() {
            powerUps.push({
                x: Math.random() * (canvas.width - 30) + 15,
                y: -30,
                type: 'health',
                speed: 2
            });
        }

        function createExplosion(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    dx: (Math.random() - 0.5) * 8,
                    dy: (Math.random() - 0.5) * 8,
                    life: 1,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        function draw() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#000428');
            gradient.addColorStop(1, '#004e92');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            stars.forEach(star => {
                ctx.fillStyle = `rgba(255, 255, 255, ${star.brightness})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.lineTo(player.x + player.width - 10, player.y + player.height - 5);
            ctx.lineTo(player.x + player.width / 2, player.y + 10);
            ctx.lineTo(player.x + 10, player.y + player.height - 5);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.closePath();
            ctx.fill();
            
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.moveTo(player.x + 15, player.y + player.height - 5);
            ctx.lineTo(player.x + player.width / 2, player.y + player.height + 15 + Math.random() * 10);
            ctx.lineTo(player.x + player.width - 15, player.y + player.height - 5);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#f1c40f';
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x - bullet.width/2, bullet.y, bullet.width, bullet.height);
                ctx.fillStyle = 'rgba(241, 196, 15, 0.5)';
                ctx.fillRect(bullet.x - bullet.width/2, bullet.y + bullet.height, bullet.width, 10);
                ctx.fillStyle = '#f1c40f';
            });

            enemies.forEach(enemy => {
                if (enemy.type === 'basic') ctx.fillStyle = '#e74c3c';
                else if (enemy.type === 'fast') ctx.fillStyle = '#9b59b6';
                else ctx.fillStyle = '#2ecc71';
                
                ctx.beginPath();
                ctx.moveTo(enemy.x + enemy.width / 2, enemy.y + enemy.height);
                ctx.lineTo(enemy.x, enemy.y);
                ctx.lineTo(enemy.x + enemy.width, enemy.y);
                ctx.closePath();
                ctx.fill();
                
                if (enemy.health > 1) {
                    ctx.fillStyle = '#e74c3c';
                    ctx.fillRect(enemy.x, enemy.y - 8, enemy.width, 4);
                    ctx.fillStyle = '#2ecc71';
                    ctx.fillRect(enemy.x, enemy.y - 8, enemy.width * (enemy.health / 3), 4);
                }
            });

            powerUps.forEach(powerUp => {
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath();
                ctx.arc(powerUp.x, powerUp.y, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('❤', powerUp.x, powerUp.y + 1);
            });

            particles = particles.filter(p => {
                p.x += p.dx;
                p.y += p.dy;
                p.life -= 0.02;
                if (p.life > 0) {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    return true;
                }
                return false;
            });
        }

        function update() {
            if (!gameRunning) return;

            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });

            enemySpawnTimer++;
            const spawnRate = Math.max(30, 60 - Math.floor(score / 100));
            if (enemySpawnTimer > spawnRate) {
                createEnemy();
                enemySpawnTimer = 0;
            }

            powerUpSpawnTimer++;
            if (powerUpSpawnTimer > 600) {
                createPowerUp();
                powerUpSpawnTimer = 0;
            }

            bullets = bullets.filter(bullet => {
                bullet.y -= bullet.speed;
                return bullet.y > -20;
            });

            enemies = enemies.filter(enemy => {
                enemy.y += enemy.speed;
                
                for (let i = bullets.length - 1; i >= 0; i--) {
                    const bullet = bullets[i];
                    if (bullet.x > enemy.x &&
                        bullet.x < enemy.x + enemy.width &&
                        bullet.y < enemy.y + enemy.height &&
                        bullet.y > enemy.y) {
                        
                        enemy.health--;
                        bullets.splice(i, 1);
                        createExplosion(bullet.x, bullet.y, '#f1c40f', 5);
                        
                        if (enemy.health <= 0) {
                            score += enemy.score;
                            createExplosion(enemy.x + enemy.width/2, enemy.y + enemy.height/2, '#e74c3c', 15);
                            updateUI();
                            return false;
                        }
                    }
                }
                
                if (enemy.x < player.x + player.width &&
                    enemy.x + enemy.width > player.x &&
                    enemy.y < player.y + player.height &&
                    enemy.y + enemy.height > player.y) {
                    
                    lives--;
                    createExplosion(player.x + player.width/2, player.y + player.height/2, '#e74c3c', 20);
                    updateUI();
                    
                    if (lives <= 0) {
                        gameOver();
                    }
                    return false;
                }
                
                return enemy.y < canvas.height + 50;
            });

            powerUps = powerUps.filter(powerUp => {
                powerUp.y += powerUp.speed;
                
                const dx = powerUp.x - (player.x + player.width/2);
                const dy = powerUp.y - (player.y + player.height/2);
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < 30) {
                    lives = Math.min(5, lives + 1);
                    createExplosion(powerUp.x, powerUp.y, '#2ecc71', 10);
                    updateUI();
                    return false;
                }
                
                return powerUp.y < canvas.height + 30;
            });

            // 自动射击
            autoShootTimer++;
            if (autoShootTimer > 8) {
                createBullet();
                autoShootTimer = 0;
            }

            draw();
            animationId = requestAnimationFrame(update);
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = '❤️'.repeat(lives);
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('shooterHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        function startGame() {
            initGame();
            gameRunning = true;
            document.getElementById('gameOver').style.display = 'none';
            if (animationId) cancelAnimationFrame(animationId);
            update();
        }

        // 键盘控制
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === 'Escape') {
                location.href = '../index.html';
                return;
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // 触摸控制
        function handleTouch(direction, pressed) {
            touchState[direction] = pressed;
        }
        
        function handleFire(pressed) {
            touchState.fire = pressed;
        }
        
        // 触摸拖动控制
        let isDragging = false;
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            player.x = touch.clientX - rect.left - player.width / 2;
            player.y = touch.clientY - rect.top - player.height / 2;
        }, {passive: false});
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDragging) {
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                player.x = touch.clientX - rect.left - player.width / 2;
                player.y = touch.clientY - rect.top - player.height / 2;
                
                // 边界限制
                player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
                player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));
            }
        }, {passive: false});
        
        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });

        function movePlayer() {
            if (gameRunning) {
                // 键盘控制
                if ((keys['ArrowLeft'] || keys['a'] || keys['A']) && player.x > 0) {
                    player.x -= player.speed;
                }
                if ((keys['ArrowRight'] || keys['d'] || keys['D']) && player.x < canvas.width - player.width) {
                    player.x += player.speed;
                }
                if ((keys['ArrowUp'] || keys['w'] || keys['W']) && player.y > 0) {
                    player.y -= player.speed;
                }
                if ((keys['ArrowDown'] || keys['s'] || keys['S']) && player.y < canvas.height - player.height) {
                    player.y += player.speed;
                }
                
                // 触摸方向键控制
                if (touchState.left && player.x > 0) player.x -= player.speed;
                if (touchState.right && player.x < canvas.width - player.width) player.x += player.speed;
                if (touchState.up && player.y > 0) player.y -= player.speed;
                if (touchState.down && player.y < canvas.height - player.height) player.y += player.speed;
            }
            requestAnimationFrame(movePlayer);
        }

        movePlayer();
        draw();
    </script>
</body>
</html>
